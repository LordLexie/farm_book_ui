<div class="page-header">
  <div>
    <h1 class="page-title">Permissions</h1>
    <p class="page-subtitle">System permissions managed by the application</p>
  </div>
</div>

<div class="table-card">
  @if (isLoading()) {
    <div class="loading-state">
      <mat-spinner diameter="40" />
    </div>
  } @else if (permissions().length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">lock</mat-icon>
      <p>No permissions found.</p>
    </div>
  } @else {
    <table mat-table [dataSource]="permissions()" class="data-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Permission</th>
        <td mat-cell *matCellDef="let item">
          <span class="permission-chip">{{ item.name }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="guard_name">
        <th mat-header-cell *matHeaderCellDef>Guard</th>
        <td mat-cell *matCellDef="let item">{{ item.guard_name }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator
      [length]="totalItems()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
    />
  }
</div>
