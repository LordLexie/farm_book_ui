<h2 mat-dialog-title>{{ isEditMode ? 'Edit Permission' : 'Add Permission' }}</h2>

<mat-dialog-content>
  @if (errorMessage()) {
    <div class="error-banner">{{ errorMessage() }}</div>
  }
  <form [formGroup]="form" class="form-body">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Permission Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. manage farms" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Permission name is required</mat-error>
      }
      @if (form.controls.name.hasError('maxlength')) {
        <mat-error>Name must be 255 characters or fewer</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button
    mat-flat-button
    color="primary"
    [disabled]="form.invalid || isSaving()"
    (click)="submit()"
  >
    @if (isSaving()) {
      <mat-spinner diameter="18" />
    } @else {
      {{ isEditMode ? 'Save' : 'Add Permission' }}
    }
  </button>
</mat-dialog-actions>
