<div class="page-header">
  <div>
    <h1 class="page-title">{{ config.title }}</h1>
    <p class="page-subtitle">{{ config.subtitle }}</p>
  </div>
  <button mat-flat-button color="primary" (click)="openAddDialog()">
    <mat-icon>add</mat-icon>
    Add
  </button>
</div>

<div class="table-card">
  @if (isLoading()) {
    <div class="loading-state">
      <mat-spinner diameter="40" />
    </div>
  } @else if (items().length === 0) {
    <div class="empty-state">
      <mat-icon class="empty-icon">{{ config.icon }}</mat-icon>
      <p>No {{ config.title.toLowerCase() }} found.</p>
      <button mat-stroked-button color="primary" (click)="openAddDialog()">Add</button>
    </div>
  } @else {
    <table mat-table [dataSource]="items()" class="lookup-table">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let item">
          <span class="code-chip">{{ item.code }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let item">{{ item.name }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let item" class="actions-cell">
          <button mat-icon-button (click)="openEditDialog(item)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator
      [length]="totalItems()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="pageSizeOptions"
      (page)="onPageChange($event)"
      showFirstLastButtons
    />
  }
</div>
